<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f7fb;
        }

        .chat-container{
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        .chat-header{
            background:#0072ff;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .chat-messages{
            flex:1;
            padding:15px;
            overflow-y:auto;
        }

        .bot{
            background:white;
            padding:12px;
            border-radius:12px;
            margin-bottom:10px;
            width:fit-content;
            max-width:80%;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .user{
            background:#0072ff;
            color:white;
            padding:12px;
            border-radius:12px;
            margin-bottom:10px;
            margin-left:auto;
            width:fit-content;
            max-width:80%;
        }

        .chat-input{
            display:flex;
            padding:10px;
            background:white;
        }

        .chat-input input{
            flex:1;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            outline:none;
        }

        .chat-input button{
            margin-left:10px;
            padding:12px 20px;
            border:none;
            background:#0072ff;
            color:white;
            border-radius:10px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        AI Interview Assistant
    </div>

    <div class="chat-messages" id="chatMessages">

        <div class="bot">
            Hello 👋<br>
            Ask me anything about AI, coding, interviews, or placements.
        </div>

    </div>

    <div class="chat-input">

        <input
            type="text"
            id="userInput"
            placeholder="Ask something...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

async function sendMessage(){

    let input = document.getElementById("userInput");

    let message = input.value.trim();

    if(message === "") return;

    let chat = document.getElementById("chatMessages");

    chat.innerHTML += `
        <div class="user">${message}</div>
    `;

    input.value = "";

    const response = await fetch('/api/chat', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body: JSON.stringify({
            message: message
        })
    });

    const data = await response.json();

    chat.innerHTML += `
        <div class="bot">${data.reply}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
