{% extends 'base.html' %}

{% block content %}
<section class="section-card">
    <div class="domain-header">
        <div>
            <h2>{{ domain.title }}</h2>
            <p>{{ domain.description }}</p>
        </div>
        <a class="button" href="/quiz/{{ domain.key }}/all">Take {{ domain.title }} Test</a>
    </div>

    <h3>Interview Topics</h3>
    <div class="topic-grid">
        {% for topic in domain.topics %}
        <div class="topic-card">
            <h4>{{ topic.title }}</h4>
            <p>{{ topic.description }}</p>
            <a class="button-secondary" href="/domain/{{ domain.key }}/{{ topic.key }}">View Questions</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
