{% extends 'base.html' %}

{% block content %}
<section class="section-card">
    <h2>Preparation Resources</h2>
    <p>Use these books, online courses, and articles to deepen your AI interview knowledge.</p>
    <div class="resource-grid">
        {% for resource in resources %}
        <div class="resource-card">
            <h3>{{ resource.title }}</h3>
            <p>{{ resource.description }}</p>
            <a class="link-button" href="{{ resource.link }}" target="_blank" rel="noreferrer">Open Resource</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
