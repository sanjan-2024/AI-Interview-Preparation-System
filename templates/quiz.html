{% extends 'base.html' %}

{% block content %}
<section class="section-card quiz-page">
    <div class="domain-header">
        <div>
            <h2>{{ domain.title }}{% if topic %} — {{ topic.title }}{% endif %}</h2>
            <p>Take a 10-question quiz for this topic. Each attempt loads fresh randomized questions and options.</p>
        </div>
        <a class="button-secondary" href="/domain/{{ domain.key }}">Back to {{ domain.title }}</a>
    </div>

    <div class="quiz-card" id="quiz-card">
        <p>Loading your quiz...</p>
    </div>
</section>

<script>
const quizCard = document.getElementById('quiz-card');
const domainKey = "{{ domain.key }}";
const topicKey = "{{ topic.key if topic else 'all' }}";
let questions = [];
let current = 0;
let score = 0;
let selectedAnswer = null;

async function loadQuiz() {
    const response = await fetch(`/api/quiz/${domainKey}/${topicKey}?count=10`);
    questions = await response.json();
    current = 0;
    score = 0;
    selectedAnswer = null;
    showQuestion();
}

function showQuestion() {
    if (!questions.length) {
        quizCard.innerHTML = '<p>No questions are available for this topic.</p>';
        return;
    }
    if (current >= questions.length) {
        quizCard.innerHTML = `
            <div class="quiz-result">
                <h3>Quiz Completed</h3>
                <p>Your score: <strong>${score} / ${questions.length}</strong></p>
                <button class="button" onclick="loadQuiz()">Retry Quiz</button>
            </div>
        `;
        return;
    }

    const q = questions[current];
    quizCard.innerHTML = `
        <div>
            <h3>Question ${current + 1} of ${questions.length}</h3>
            <p>${q.question}</p>
            <div class="options"></div>
            <div class="quiz-action-row">
                <button id="submit-btn" class="button" disabled>Submit</button>
                <button id="restart-btn" class="button-secondary">Restart</button>
            </div>
            <div id="feedback" class="quiz-feedback"></div>
        </div>
    `;

    const options = quizCard.querySelector('.options');
    q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.innerText = option;
        btn.onclick = () => selectAnswer(index);
        options.appendChild(btn);
    });

    document.getElementById('restart-btn').addEventListener('click', loadQuiz);
}

function selectAnswer(index) {
    selectedAnswer = index;
    quizCard.querySelectorAll('.option-btn').forEach((button, idx) => {
        button.classList.toggle('selected', idx === index);
    });
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = false;
    submitBtn.onclick = submitAnswer;
}

function submitAnswer() {
    const q = questions[current];
    const feedback = document.getElementById('feedback');
    const correct = selectedAnswer === q.answer_index;
    if (correct) {
        score += 1;
        feedback.innerHTML = '<p class="correct">Correct!</p>';
    } else {
        feedback.innerHTML = `<p class="incorrect">Incorrect — correct answer: ${q.answer_text}</p>`;
    }

    quizCard.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
    document.getElementById('submit-btn').disabled = true;
    current += 1;
    setTimeout(showQuestion, 1400);
}

loadQuiz();
</script>
{% endblock %}
