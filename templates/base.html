<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prep — AI Interview</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1 class="site-title"><a href="/">Prep</a></h1>
        <nav class="site-nav">
            <a href="/" class="home-link">⌂ Home</a>
            <div class="nav-dropdown">
                <span>Domains</span>
                <div class="dropdown-menu">
                    {% for domain in topics %}
                    <a href="/domain/{{ domain.key }}">{{ domain.title }}</a>
                    {% endfor %}
                </div>
            </div>
            <a href="/practice">Practice</a>
            <a href="/topics">All Domains</a>
            <a href="/resources">Resources</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
    </div>
</header>
<main class="site-main container">
    {% block content %}{% endblock %}
</main>
<footer class="site-footer">
    <div class="container footer-grid">
        <div>© Prep — AI Interview Coach</div>
        <div class="footer-contact">
            <span>Contact us:</span>
            <a href="mailto:contact@prepai.com">contact@prepai.com</a>
        </div>
    </div>
</footer>
<!-- Chatbot widget -->
<div id="chat-toggle" class="chat-toggle" title="Open Prep chat">
    <img id="chat-toggle-img" src="/static/logo.png" alt="Prep" />
    <div class="chat-toggle-label">Prep</div>
</div>

<div id="chat-widget" class="chat-widget" aria-hidden="true">
    <div class="chat-header-widget">
        <div class="chat-header-left">
            <img id="chat-avatar-img" src="/static/logo.png" alt="Prep" class="chat-avatar-img">
            <div class="chat-title">Prep</div>
        </div>
        <button id="chat-close" class="chat-close">✕</button>
    </div>
    <div id="chat-window-widget" class="chat-window-widget">
        <div class="chat-message bot-message"><div class="message-text">Hi — I'm Prep. Ask me about quizzes or topics.</div></div>
    </div>
    <div class="chat-input-widget">
        <input id="chat-input-widget" placeholder="Ask Prep..." />
        <button id="chat-send" class="button">Send</button>
    </div>
</div>

<script src="/static/chatbot.js"></script>
</body>
</html>
